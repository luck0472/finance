{% extends "layout.html" %}

{% block title %}
    Sell Shares
{% endblock %}

{% block main %}
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0">
                <div class="card-header">
                    <h2 class="mb-0" style="border: none; padding: 0;">Sell Shares</h2>
                </div>
                <div class="card-body">
                    <form action="/sell" method="post">
                        <div class="mb-3">
                            <label for="symbol" class="form-label">Select Stock</label>
                            <select class="form-select" id="symbol" name="symbol" required>
                                <option value="">Choose a stock to sell...</option>
                                {% for stock in stocks %}
                                    <option value="{{ stock.symbol }}">{{ stock.symbol }} - {{ stock.name }} ({{ stock.total_shares }} shares)</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="shares" class="form-label">Number of Shares to Sell</label>
                            <input class="form-control" id="shares" name="shares" placeholder="e.g., 5" type="number" min="1" required>
                            <small class="form-text text-muted">Must be a positive integer</small>
                        </div>
                        <button class="btn btn-danger w-100 py-2" type="submit">Sell Shares</button>
                    </form>
                    <div class="mt-3">
                        <a href="/" class="btn btn-outline-secondary w-100">Back to Portfolio</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
