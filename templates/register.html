{% extends "layout.html" %}

{% block title %}
    Register
{% endblock %}

{% block main %}
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0">
                <div class="card-header">
                    <h2 class="mb-0" style="border: none; padding: 0;">Register</h2>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('register') }}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input autocomplete="off" autofocus class="form-control" id="username" name="username" placeholder="Choose a username" type="text" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input class="form-control" id="password" name="password" placeholder="Enter a password" type="password" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirmation" class="form-label">Confirm Password</label>
                            <input class="form-control" id="confirmation" name="confirmation" placeholder="Confirm your password" type="password" required>
                        </div>
                        <button class="btn btn-primary w-100 py-2" type="submit">Register</button>
                    </form>
                    <div class="mt-3 text-center">
                        <p class="text-muted small">Already have an account? <a href="/login">Log in here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
