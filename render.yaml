services:
  - type: web
    name: finance-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATA_DIR
        value: /var/data
